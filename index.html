<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Children's Ministry — Mt. Calvary M.B. Church</title>
  <meta name="description" content="Children's Church Information System for Mt. Calvary Missionary Baptist Church. Synced to Google Sheets." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E✨%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300..900;1,300..900&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --cream: #F5EFE4; --cream-soft: #FAF6EE; --sage: #5C7A5A; --sage-dark: #3E5A3C;
      --sage-soft: #A8BEA6; --terra: #B8623D; --terra-soft: #E8A98A; --ink: #2A2824;
      --ink-soft: #5C574E; --gold: #C89B3C; --paper: #FFFDF7; --divider: #D8CFBE;
      --danger: #A43E1F; --danger-bg: #F7E4DC; --success: #3E5A3C; --success-bg: #DDE7D8;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Lora', Georgia, serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
    .font-display { font-family: 'Fraunces', Georgia, serif; font-variation-settings: "opsz" 144, "SOFT" 50; }
    .font-serif { font-family: 'Lora', Georgia, serif; }
    .btn { cursor: pointer; font-family: inherit; border: none; transition: all .2s; letter-spacing: .02em; }
    .btn-primary { background: var(--sage-dark); color: var(--cream-soft); }
    .btn-primary:hover { background: var(--ink); transform: translateY(-1px); box-shadow: 0 8px 20px -8px rgba(62,90,60,.5); }
    .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--divider); }
    .btn-ghost:hover { background: var(--paper); border-color: var(--sage); }
    .btn-terra { background: var(--terra); color: var(--cream-soft); }
    .btn-terra:hover { background: #9A4E2F; }
    .btn-danger { background: transparent; color: var(--danger); border: none; cursor: pointer; }
    .btn-danger:hover { text-decoration: underline; }
    .card { background: var(--paper); border: 1px solid var(--divider); border-radius: 4px; }
    .input-field { background: var(--cream-soft); border: 1px solid var(--divider); color: var(--ink); padding: .6rem .8rem; border-radius: 3px; width: 100%; font-family: inherit; font-size: .95rem; transition: border-color .2s; }
    .input-field:focus { outline: none; border-color: var(--sage); background: var(--paper); }
    .label-text { font-family: 'Fraunces', serif; font-weight: 500; color: var(--ink); font-size: .82rem; letter-spacing: .08em; text-transform: uppercase; }
    .tab-active { color: var(--ink); border-bottom: 2px solid var(--terra); }
    .tab-inactive { color: var(--ink-soft); border-bottom: 2px solid transparent; }
    .tab-inactive:hover { color: var(--ink); }
    .ornament::before, .ornament::after { content: '❦'; color: var(--gold); margin: 0 .8rem; font-size: .7em; }
    .divider-line { height: 1px; background: linear-gradient(to right, transparent, var(--divider), transparent); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .anim-in { animation: slideUp .4s ease-out both; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .anim-fade { animation: fadeIn .3s ease-out both; }
    .pill { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
    .pill-sage { background: var(--success-bg); color: var(--sage-dark); }
    .pill-terra { background: #F5E0D2; color: var(--terra); }
    .pill-gold { background: #F4E7C1; color: #8B6B1F; }
    .pill-danger { background: var(--danger-bg); color: var(--danger); }
    .icon { width: 16px; height: 16px; stroke-width: 2; stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; display: inline-block; vertical-align: middle; }
    .icon-sm { width: 14px; height: 14px; }
    .icon-lg { width: 20px; height: 20px; }
    .hidden { display: none !important; }
    .spinner { border: 4px solid var(--sage); border-top-color: transparent; border-radius: 50%; width: 48px; height: 48px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .stack > * + * { margin-top: 1rem; }
    .grid-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .grid-actions { display: grid; grid-template-columns: 1fr; gap: .75rem; }
    .grid-roster { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    .grid-detail { display: grid; grid-template-columns: 1fr; gap: 1.25rem; }
    .grid-checkin { display: grid; grid-template-columns: 1fr; gap: .5rem; max-height: 24rem; overflow-y: auto; }
    .chart-bars { display: flex; align-items: flex-end; gap: .5rem; height: 10rem; overflow: visible; }
    .chart-bar { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: .375rem; position: relative; cursor: default; outline: none; }
    .chart-bar-fill { width: 100%; border-radius: 4px 4px 0 0; min-height: 4px; transition: filter .15s; }
    .chart-bar:hover .chart-bar-fill, .chart-bar:focus .chart-bar-fill { filter: brightness(1.08); }
    .chart-tooltip {
      position: absolute;
      bottom: calc(100% + .5rem);
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--cream-soft);
      padding: .625rem .75rem;
      border-radius: 4px;
      font-size: .75rem;
      text-align: left;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
      z-index: 20;
      width: 13rem;
      max-height: 14rem;
      overflow-y: auto;
      box-shadow: 0 4px 12px rgba(0,0,0,.18);
    }
    .chart-tooltip::before {
      /* invisible bridge so cursor can move from bar into tooltip without losing hover */
      content: ''; position: absolute; top: 100%; left: 0; right: 0; height: .5rem;
    }
    .chart-tooltip::after {
      content: ''; position: absolute; top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: var(--ink);
    }
    .chart-bar:hover .chart-tooltip,
    .chart-bar:focus .chart-tooltip,
    .chart-bar:focus-within .chart-tooltip {
      opacity: 1;
      pointer-events: auto;
    }
    .chart-tooltip-header {
      font-weight: 600;
      margin-bottom: .375rem;
      padding-bottom: .375rem;
      border-bottom: 1px solid rgba(255,255,255,.15);
    }
    .chart-tooltip ul { margin: 0; padding: 0; list-style: none; }
    .chart-tooltip ul li {
      font-size: .7rem; padding: .125rem 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chart-empty { text-align: center; padding: 2rem 0; color: var(--ink-soft); font-style: italic; font-size: .875rem; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--sage-dark); color: var(--cream-soft); display: flex; align-items: center; justify-content: center; font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.1rem; flex-shrink: 0; }
    .avatar-lg { width: 80px; height: 80px; font-size: 2rem; }
    .avatar-sm { width: 44px; height: 44px; font-size: 1rem; }
    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); padding: .75rem 1.25rem; border-radius: 3px; box-shadow: 0 10px 25px rgba(0,0,0,.15); z-index: 50; display: flex; align-items: center; gap: .5rem; font-size: .9rem; font-weight: 500; color: var(--cream-soft); }
    @media (min-width: 640px) {
      .grid-stats { grid-template-columns: repeat(4, 1fr); }
      .grid-actions { grid-template-columns: repeat(3, 1fr); }
      .grid-roster { grid-template-columns: repeat(2, 1fr); }
      .grid-detail { grid-template-columns: repeat(2, 1fr); }
      .grid-checkin { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      .grid-roster { grid-template-columns: repeat(3, 1fr); }
    }
  </style>

  <script>
  // ============================================================
  // Mt. Calvary M.B. Church — Children's Ministry System
  // Version 2.0.3
  // Google Sheets-backed version.
  // First run: enter your Web App URL and passcode to connect.
  // Data is synced to a shared Google Sheet and cached locally
  // so the app keeps working if the network drops.
  // ============================================================

  const APP_VERSION = '2.0.3';

  const KEYS = {
    CHILDREN: 'cc:children',
    ATTENDANCE: 'cc:attendance',
    PARENTS: 'cc:parents',
    CONFIG: 'cc:config',          // { backendUrl, passcode }  — set during initial setup
    SESSION: 'cc:session',        // { username, sessionToken, user } — set after login
    PENDING: 'cc:pending'         // queue of actions to retry when back online
  };

  // State
  const state = {
    children: [],
    attendance: [],
    parents: [],
    users: [],                    // populated only when an Admin opens User Management
    view: 'dashboard',
    selectedId: null,
    editing: null,
    editingParent: null,
    editingUser: null,            // user record being edited in User Management
    addingUser: false,            // showing the New User form
    resettingPasswordFor: null,   // username currently in password-reset confirm flow
    showChangePassword: false,    // change-my-password modal open
    search: '',
    parentSearch: '',
    checkinSearch: '',
    userSearch: '',
    checkoutOtherFor: null,    // attendance record ID currently in "specify other adult" mode
    checkoutOtherName: '',     // text being typed in the Other input
    // Backend
    config: null,                 // null until configured
    session: null,                // { username, sessionToken, user } — null when logged out
    online: true,                 // last sync attempt succeeded
    syncing: false,               // request in flight
    pendingCount: 0,              // queued writes waiting to retry
    showSettings: false,
    showUserMenu: false,
    bootError: null,              // shown on login screen
    loginError: null,             // shown on login screen during username/password attempt
    backendVersion: null,         // version reported by backend on last load
    loginDraft: { backendUrl: '', passcode: '', username: '', password: '' }
  };

  // Storage
  const store = {
    load(key, fallback) {
      try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }
      catch(e) { return fallback; }
    },
    save(key, value) {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) { console.warn(e); }
    },
    remove(key) {
      try { localStorage.removeItem(key); } catch(e) { /* ignore */ }
    }
  };

  // ============================================================
  // Backend API — talks to the Apps Script Web App
  // ============================================================
  const api = {
    async get() {
      if (!state.config) throw new Error('Not configured');
      let url = state.config.backendUrl + '?passcode=' + encodeURIComponent(state.config.passcode);
      if (state.session) {
        url += '&authUsername=' + encodeURIComponent(state.session.username);
        url += '&sessionToken=' + encodeURIComponent(state.session.sessionToken);
      }
      const res = await fetch(url, { method: 'GET', redirect: 'follow' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (!data.ok) {
        const e = new Error(data.error || 'Server error');
        e.serverError = data.error;
        throw e;
      }
      return data;
    },
    async post(action, payload) {
      if (!state.config) throw new Error('Not configured');
      const body = Object.assign({ action, passcode: state.config.passcode }, payload);
      // Login itself doesn't need auth — every other action does
      if (state.session && action !== 'login') {
        body.authUsername = state.session.username;
        body.sessionToken = state.session.sessionToken;
      }
      // Apps Script requires text/plain to avoid CORS preflight
      const res = await fetch(state.config.backendUrl, {
        method: 'POST',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (!data.ok) {
        const e = new Error(data.error || 'Server error');
        e.serverError = data.error;
        throw e;
      }
      return data;
    }
  };

  // Wraps an async operation: updates local state immediately (optimistic),
  // writes to the backend, falls back to queueing on failure.
  async function syncAction(action, payload, optimisticUpdate) {
    // 1. Apply optimistic update to local state + cache
    if (optimisticUpdate) optimisticUpdate();
    saveCache();
    render();

    // 2. Try to persist to backend
    if (!state.config) return;
    state.syncing = true;
    updateHeaderStatus();
    try {
      const result = await api.post(action, payload);
      state.online = true;
      state.syncing = false;
      updateHeaderStatus();
      return result;
    } catch (err) {
      state.online = false;
      state.syncing = false;
      // Auth errors mean the session is no longer valid — force re-login
      if (err.serverError && /Authentication required|Session expired|User not found|Account is inactive|Not signed in/.test(err.serverError)) {
        forceLogout(err.serverError);
        return;
      }
      // Permission errors should NOT be queued for retry — they'll always fail
      if (err.serverError && /Permission denied/.test(err.serverError)) {
        toast(err.serverError, 'error');
        return;
      }
      // Queue the action for retry
      const pending = store.load(KEYS.PENDING, []);
      pending.push({ action, payload, ts: Date.now() });
      store.save(KEYS.PENDING, pending);
      state.pendingCount = pending.length;
      updateHeaderStatus();
      toast('Saved locally. Will sync when back online.', 'warn');
    }
  }

  // Boot the user out of their current session when their token has expired,
  // their account was deactivated, etc. Keeps the config (backend URL + passcode)
  // so the next user can sign in without re-doing setup.
  // Clear all transient UI state so the next render starts from a clean slate.
  // Call this on sign-in (success) and any sign-out path so an in-progress
  // modal or form from one user's session doesn't bleed into another's.
  function resetTransientUiState() {
    state.editing = null;
    state.editingParent = null;
    state.editingUser = null;
    state.addingUser = false;
    state.selectedId = null;
    state.search = '';
    state.parentSearch = '';
    state.checkinSearch = '';
    state.userSearch = '';
    state.showSettings = false;
    state.showUserMenu = false;
    state.showChangePassword = false;
    state.resettingPasswordFor = null;
    state.checkoutOtherFor = null;
    state.checkoutOtherName = '';
    state.bootError = null;
    state.loginError = null;
  }

  function forceLogout(reason) {
    state.session = null;
    state.users = [];
    store.remove(KEYS.SESSION);
    resetTransientUiState();
    state.view = 'login';
    state.bootError = reason || 'Your session ended. Please sign in again.';
    render();
  }

  async function retryPending() {
    const pending = store.load(KEYS.PENDING, []);
    if (pending.length === 0) return;
    state.syncing = true;
    updateHeaderStatus();
    const remaining = [];
    for (const item of pending) {
      try { await api.post(item.action, item.payload); }
      catch (err) { remaining.push(item); }
    }
    store.save(KEYS.PENDING, remaining);
    state.pendingCount = remaining.length;
    state.online = remaining.length === 0;
    state.syncing = false;
    if (pending.length > remaining.length) {
      toast(`Synced ${pending.length - remaining.length} pending change${pending.length - remaining.length === 1 ? '' : 's'}`);
    }
    updateHeaderStatus();
  }

  function saveCache() {
    store.save(KEYS.CHILDREN, state.children);
    store.save(KEYS.ATTENDANCE, state.attendance);
    store.save(KEYS.PARENTS, state.parents);
  }

  function updateHeaderStatus() {
    const el = document.getElementById('sync-status');
    if (el) el.outerHTML = syncStatusHTML();
  }

  function syncStatusHTML() {
    const p = state.pendingCount;
    let html = '', label = '', color = 'var(--ink-soft)', iconName = 'cloud';
    if (!state.config) {
      return `<div id="sync-status" style="display:none"></div>`;
    }
    if (state.syncing) {
      label = 'Syncing…';
      color = 'var(--sage)';
      iconName = 'refresh';
    } else if (!state.online || p > 0) {
      label = p > 0 ? `${p} pending` : 'Offline';
      color = 'var(--terra)';
      iconName = 'cloud-off';
    } else {
      label = 'Synced';
      color = 'var(--sage)';
      iconName = 'cloud';
    }
    return `<div id="sync-status" style="display:flex;align-items:center;gap:.375rem;font-size:.75rem;color:${color};">${icon(iconName,'icon icon-sm')}<span>${label}</span></div>`;
  }

  // Helpers
  const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
  const todayISO = () => new Date().toISOString().slice(0,10);
  const nowISO = () => new Date().toISOString();
  // Normalize whatever format the backend or local storage gives us
  // (Sheets dates round-trip as "2026-04-29T00:00:00.000Z"; local dates are "2026-04-29")
  // down to a clean "YYYY-MM-DD" string for safe comparison and grouping.
  const normalizeDate = (raw) => {
    if (!raw) return '';
    const m = String(raw).match(/^\d{4}-\d{2}-\d{2}/);
    return m ? m[0] : '';
  };
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  const fmtDate = (raw) => {
    const norm = normalizeDate(raw);
    if (!norm) return '';
    const d = new Date(norm + 'T12:00:00Z');
    if (isNaN(d.getTime())) return '';
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', timeZone: 'UTC' });
  };

  // Backfill defaults for any legacy records that were created before
  // certain fields existed. Keeps the rest of the code from having to
  // null-check everywhere.
  const normalizeChild = (c) => {
    if (!Array.isArray(c.parentIds)) c.parentIds = [];
    if (!Array.isArray(c.authorizedPickupIds)) c.authorizedPickupIds = [];
    return c;
  };
  const normalizeParent = (p) => {
    // Existing parents created before v1.9 don't have these fields. Default
    // them generously so existing records don't suddenly become unauthorized.
    if (p.relationship === '' || p.relationship == null) p.relationship = 'Parent';
    if (p.authorizedForPickup === '' || p.authorizedForPickup == null) p.authorizedForPickup = true;
    return p;
  };
  const fmtTime = (iso) => iso ? new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
  const calcAge = (bd) => {
    if (!bd) return '';
    const b = new Date(bd), t = new Date();
    let a = t.getFullYear() - b.getFullYear();
    const m = t.getMonth() - b.getMonth();
    if (m < 0 || (m === 0 && t.getDate() < b.getDate())) a--;
    return a >= 0 ? a : '';
  };
  const initials = (name) => (name || '').split(/\s+/).filter(Boolean).map(w => w[0]).slice(0,2).join('').toUpperCase() || '?';
  const icon = (name, cls='icon') => `<svg class="${cls}"><use href="#i-${name}"/></svg>`;

  const emptyChild = () => ({
    id:'', fullName:'', birthdate:'', gradeLevel:'', school:'', parentNames:'',
    phoneNumbers:'', emails:'', preferredContact:'Phone', allergies:'', allergySeverity:'None',
    medicalConditions:'', specialNeeds:'', emergencyContact:'', authorizedPickup:'',
    photoConsent:false, newsletterOptIn:false, visitorStatus:'Member', churchMembership:'',
    prayerRequests:'', classroom:'', parentIds:[], authorizedPickupIds:[], createdAt:''
  });

  const emptyParent = () => ({
    id:'', fullName:'', phoneNumbers:'', emails:'', preferredContact:'Phone',
    address:'', churchMembership:'', notes:'',
    relationship:'Parent', authorizedForPickup:true,
    createdAt:''
  });

  // Sample data shown only in demo mode (no backend configured)
  const seed = [
    Object.assign(emptyChild(), {id:uid(), fullName:'Amara Johnson', birthdate:'2017-03-14', gradeLevel:'2nd Grade', school:'Oakwood Elementary', parentNames:'Denise & Marcus Johnson', phoneNumbers:'(555) 123-4567', emails:'dmjohnson@example.com', preferredContact:'Text', allergies:'Peanuts', allergySeverity:'Severe', emergencyContact:'Grandma Ruth — (555) 222-3344', authorizedPickup:'Denise Johnson, Marcus Johnson, Ruth Johnson', photoConsent:true, newsletterOptIn:true, visitorStatus:'Member', churchMembership:'Mt. Calvary', prayerRequests:'Strength at school', classroom:'Lambs', createdAt:nowISO()}),
    Object.assign(emptyChild(), {id:uid(), fullName:'Eli Carter', birthdate:'2019-08-02', gradeLevel:'Pre-K', school:'Sunshine Preschool', parentNames:'Tasha Carter', phoneNumbers:'(555) 987-6543', emails:'tasha.c@example.com', preferredContact:'Phone', allergies:'Dairy', allergySeverity:'Mild', medicalConditions:'Asthma (inhaler in bag)', emergencyContact:'Aunt Bri — (555) 777-1122', authorizedPickup:'Tasha Carter, Bri Carter', newsletterOptIn:true, visitorStatus:'Visitor', classroom:'Little Lights', createdAt:nowISO()})
  ];

  // ============================================================
  // Boot
  // ============================================================
  async function init() {
    // Load config + session from storage
    state.config = store.load(KEYS.CONFIG, null);
    state.session = store.load(KEYS.SESSION, null);
    state.pendingCount = store.load(KEYS.PENDING, []).length;

    // If no config: show "connect" step of login screen with demo data
    if (!state.config) {
      state.children = (store.load(KEYS.CHILDREN, null) || seed).map(normalizeChild);
      state.attendance = store.load(KEYS.ATTENDANCE, []);
      state.parents = store.load(KEYS.PARENTS, []).map(normalizeParent);
      state.view = 'login';
      render();
      return;
    }

    // Have config, but no session: show username/password step of login screen
    if (!state.session) {
      // Don't show stale cached children/attendance to a logged-out user
      state.children = [];
      state.attendance = [];
      state.parents = [];
      state.view = 'login';
      render();
      return;
    }

    // Have config AND session — load from cache for fast paint
    state.children = store.load(KEYS.CHILDREN, []).map(normalizeChild);
    state.attendance = store.load(KEYS.ATTENDANCE, []);
    state.parents = store.load(KEYS.PARENTS, []).map(normalizeParent);
    state.view = 'dashboard';
    render();

    // Then try to sync from backend
    await refreshFromBackend();
    // Retry any pending writes
    await retryPending();
  }

  async function refreshFromBackend() {
    if (!state.config) return;
    state.syncing = true;
    updateHeaderStatus();
    try {
      const data = await api.get();
      state.children = (data.children || []).map(normalizeChild);
      state.attendance = data.attendance || [];
      state.parents = (data.parents || []).map(normalizeParent);
      state.backendVersion = data.backendVersion || null;
      saveCache();
      state.online = true;
      state.syncing = false;
      updateHeaderStatus();
      render();
    } catch (err) {
      state.online = false;
      state.syncing = false;
      // Auth errors mean the session is no longer valid — force re-login
      if (err.serverError && /Authentication required|Session expired|User not found|Account is inactive|Not signed in/.test(err.serverError)) {
        forceLogout(err.serverError);
        return;
      }
      updateHeaderStatus();
      console.warn('Backend fetch failed, using cached data:', err.message);
    }
  }

  function toast(msg, kind='success') {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const bg = kind === 'error' ? 'var(--danger)' : kind === 'warn' ? 'var(--terra)' : 'var(--sage-dark)';
    const el = document.createElement('div');
    el.className = 'toast anim-in';
    el.style.background = bg;
    el.innerHTML = icon('check','icon icon-sm') + '<span>' + esc(msg) + '</span>';
    document.body.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; }, 2500);
    setTimeout(() => el.remove(), 2900);
  }

  // ============================================================
  // Actions
  // ============================================================
  const actions = {
    goto(view, opts={}) {
      state.view = view;
      if ('selectedId' in opts) state.selectedId = opts.selectedId;
      if ('editing' in opts) state.editing = opts.editing;
      if ('editingParent' in opts) state.editingParent = opts.editingParent;
      window.scrollTo({top: 0});
      render();
      // Auto-load users any time we navigate to the Users view (via tab, card, etc.)
      if (view === 'users' && isAdmin()) this.loadUsers();
    },

    // Step 1 of login: validate the backend URL + passcode by hitting the backend.
    // Since LOGIN is now required, we call a no-data endpoint just to verify
    // the passcode works. The backend will reject with "Authentication required"
    // if the passcode is right but no session — which still tells us the URL
    // and passcode are correct. Then we proceed to the sign-in step.
    async connect(backendUrl, passcode) {
      backendUrl = (backendUrl || '').trim();
      passcode = (passcode || '').trim();
      state.loginDraft = Object.assign({}, state.loginDraft, { backendUrl, passcode: '' });
      if (!backendUrl || !passcode) {
        state.bootError = 'Both Web App URL and passcode are required.';
        render();
        return;
      }
      if (!/^https:\/\/script\.google(usercontent)?\.com\//.test(backendUrl)) {
        state.bootError = 'That doesn\'t look like an Apps Script Web App URL. It should start with https://script.google.com/';
        render();
        return;
      }
      state.config = { backendUrl, passcode };
      state.bootError = null;
      state.syncing = true;
      render();
      try {
        // Probe the backend. With LOGIN required and no session, expect
        // a controlled "Authentication required" — that's success for this step.
        await api.get();
        // Unexpectedly succeeded with no auth — backend has login disabled or returned data
        // Either way, save config and proceed to sign-in step
      } catch (err) {
        if (err.serverError && /Authentication required|Not signed in/.test(err.serverError)) {
          // Expected: passcode worked, now we need to sign in
        } else if (err.serverError && /Invalid passcode/.test(err.serverError)) {
          state.config = null;
          state.syncing = false;
          state.bootError = 'Invalid passcode. Check your Apps Script PASSCODE constant.';
          render();
          return;
        } else {
          state.config = null;
          state.syncing = false;
          state.bootError = 'Could not connect: ' + err.message + '. Check your URL and that the Web App is deployed with access set to "Anyone".';
          render();
          return;
        }
      }
      // Save config (passcode is fine — sheet's own protection still applies)
      store.save(KEYS.CONFIG, state.config);
      state.syncing = false;
      state.bootError = null;
      // Now show the sign-in step
      render();
    },

    // Step 2 of login: username + password
    async signIn(username, password) {
      username = (username || '').trim();
      state.loginDraft = Object.assign({}, state.loginDraft, { username });
      if (!username || !password) {
        state.loginError = 'Both username and password are required.';
        render();
        return;
      }
      state.loginError = null;
      state.bootError = null;
      state.syncing = true;
      render();
      try {
        const result = await api.post('login', { username, password });
        // Save session
        state.session = {
          username: result.user.username,
          sessionToken: result.sessionToken,
          user: result.user
        };
        store.save(KEYS.SESSION, state.session);
        state.loginDraft = { backendUrl: '', passcode: '', username: '', password: '' };
        // Reset any UI state that may have leaked in from a prior session
        resetTransientUiState();
        // Load all the data
        const data = await api.get();
        state.children = (data.children || []).map(normalizeChild);
        state.attendance = data.attendance || [];
        state.parents = (data.parents || []).map(normalizeParent);
        state.backendVersion = data.backendVersion || null;
        saveCache();
        state.online = true;
        state.syncing = false;
        state.view = 'dashboard';
        toast('Signed in. Welcome, ' + result.user.fullName + '.');
        render();
        retryPending();
      } catch (err) {
        state.syncing = false;
        state.loginError = err.serverError || err.message || 'Sign-in failed.';
        render();
      }
    },

    // Sign out — clear session but keep config so the next user can sign in fast
    signOut() {
      state.session = null;
      state.users = [];
      state.children = [];
      state.attendance = [];
      state.parents = [];
      store.remove(KEYS.SESSION);
      store.remove(KEYS.CHILDREN);
      store.remove(KEYS.ATTENDANCE);
      store.remove(KEYS.PARENTS);
      resetTransientUiState();
      state.view = 'login';
      render();
    },

    // Settings → Disconnect: also blow away config
    disconnect() {
      if (!confirm('Disconnect this device from Google Sheets? You\'ll need the Web App URL and passcode to set it up again.')) return;
      store.remove(KEYS.CONFIG);
      store.remove(KEYS.SESSION);
      store.remove(KEYS.CHILDREN);
      store.remove(KEYS.ATTENDANCE);
      store.remove(KEYS.PARENTS);
      store.remove(KEYS.PENDING);
      state.config = null;
      state.session = null;
      state.children = seed;
      state.attendance = [];
      state.parents = [];
      state.pendingCount = 0;
      state.showSettings = false;
      state.view = 'login';
      render();
    },

    async changeOwnPassword(currentPassword, newPassword, confirmPassword) {
      if (!currentPassword || !newPassword) { toast('All password fields are required.', 'error'); return; }
      if (newPassword.length < 6) { toast('New password must be at least 6 characters.', 'error'); return; }
      if (newPassword !== confirmPassword) { toast('New password and confirmation do not match.', 'error'); return; }
      try {
        const result = await api.post('changeOwnPassword', { currentPassword, newPassword });
        // Backend returns a fresh session token (since hash changed)
        if (result.sessionToken) {
          state.session.sessionToken = result.sessionToken;
          store.save(KEYS.SESSION, state.session);
        }
        state.showChangePassword = false;
        render();
        toast('Password updated.');
      } catch (err) {
        toast(err.serverError || err.message || 'Could not change password.', 'error');
      }
    },

    async loadUsers() {
      try {
        const result = await api.post('listUsers', {});
        state.users = (result.users || []).slice().sort((a, b) => (a.fullName || a.username).localeCompare(b.fullName || b.username));
        render();
      } catch (err) {
        toast(err.serverError || err.message || 'Could not load users.', 'error');
      }
    },

    async addUser(userInput, password) {
      if (!password || password.length < 6) { toast('Password must be at least 6 characters.', 'error'); return; }
      try {
        await api.post('addUser', { user: userInput, password });
        state.addingUser = false;
        state.editingUser = null;
        state.view = 'users';
        await this.loadUsers();
        toast('User created: ' + userInput.username);
      } catch (err) {
        toast(err.serverError || err.message || 'Could not add user.', 'error');
      }
    },

    async updateUser(userInput) {
      try {
        await api.post('updateUser', { user: userInput });
        state.editingUser = null;
        state.addingUser = false;
        state.view = 'users';
        await this.loadUsers();
        toast('User updated: ' + userInput.username);
      } catch (err) {
        toast(err.serverError || err.message || 'Could not update user.', 'error');
      }
    },

    async deleteUser(username) {
      if (!confirm('Delete user "' + username + '"? This cannot be undone.')) return;
      try {
        await api.post('deleteUser', { username });
        state.editingUser = null;
        state.addingUser = false;
        state.view = 'users';
        await this.loadUsers();
        toast('User deleted: ' + username, 'warn');
      } catch (err) {
        toast(err.serverError || err.message || 'Could not delete user.', 'error');
      }
    },

    async resetUserPassword(username, newPassword, confirmPassword) {
      if (!newPassword || newPassword.length < 6) { toast('New password must be at least 6 characters.', 'error'); return; }
      if (newPassword !== confirmPassword) { toast('New password and confirmation do not match.', 'error'); return; }
      try {
        await api.post('resetUserPassword', { username, newPassword });
        state.resettingPasswordFor = null;
        render();
        toast('Password reset for ' + username + '. Share the new password with them.');
      } catch (err) {
        toast(err.serverError || err.message || 'Could not reset password.', 'error');
      }
    },

    async refresh() {
      await refreshFromBackend();
      await retryPending();
      toast('Refreshed from sheet');
    },

    async saveChild(form) {
      const err = validateChild(form);
      if (err) { toast(err, 'error'); return false; }
      const isNew = !form.id || !state.children.find(c => c.id === form.id);
      if (isNew) {
        form.id = uid();
        form.createdAt = nowISO();
      }
      form.updatedAt = nowISO();
      const msg = isNew ? `Added ${form.fullName}` : `Updated ${form.fullName}`;
      await syncAction('upsertChild', { child: form }, () => {
        if (isNew) state.children.push(form);
        else state.children = state.children.map(c => c.id === form.id ? form : c);
      });
      toast(msg);
      actions.goto('roster');
      return true;
    },

    async deleteChild(id) {
      const c = state.children.find(x => x.id === id);
      if (!c) return;
      if (!confirm(`Remove ${c.fullName} from the roster? This cannot be undone.`)) return;
      await syncAction('deleteChild', { id }, () => {
        state.children = state.children.filter(x => x.id !== id);
        state.attendance = state.attendance.filter(a => a.childId !== id);
      });
      toast(`Removed ${c.fullName}`, 'warn');
      actions.goto('roster');
    },

    async saveParent(form) {
      const err = validateParent(form);
      if (err) { toast(err, 'error'); return false; }
      const isNew = !form.id || !state.parents.find(p => p.id === form.id);
      if (isNew) {
        form.id = uid();
        form.createdAt = nowISO();
      }
      form.updatedAt = nowISO();
      const msg = isNew ? `Added ${form.fullName}` : `Updated ${form.fullName}`;
      await syncAction('upsertParent', { parent: form }, () => {
        if (isNew) state.parents.push(form);
        else state.parents = state.parents.map(p => p.id === form.id ? form : p);
      });
      toast(msg);
      actions.goto('parents');
      return true;
    },

    async deleteParent(id) {
      const p = state.parents.find(x => x.id === id);
      if (!p) return;
      if (!confirm(`Remove ${p.fullName} from the parent/guardian list? This cannot be undone.`)) return;
      await syncAction('deleteParent', { id }, () => {
        state.parents = state.parents.filter(x => x.id !== id);
      });
      toast(`Removed ${p.fullName}`, 'warn');
      actions.goto('parents');
    },

    async checkIn(childId) {
      const c = state.children.find(x => x.id === childId);
      if (!c) return;
      const rec = { id: uid(), childId, date: todayISO(), checkInAt: nowISO(), checkOutAt: '', classroom: c.classroom || '' };
      await syncAction('addAttendance', { record: rec }, () => {
        state.attendance.unshift(rec);
      });
      toast(`Checked in ${c.fullName}`);
    },

    async checkOut(recId, checkOutBy) {
      const existing = state.attendance.find(a => a.id === recId);
      if (!existing) return;
      const updated = Object.assign({}, existing, {
        checkOutAt: nowISO(),
        checkOutBy: checkOutBy || ''
      });
      await syncAction('updateAttendance', { record: updated }, () => {
        state.attendance = state.attendance.map(a => a.id === recId ? updated : a);
      });
      // Friendlier toast that names who picked up
      if (checkOutBy) {
        const p = state.parents.find(x => x.id === checkOutBy);
        const who = p ? p.fullName : checkOutBy;
        toast(`Released to ${who}`);
      } else {
        toast('Checked out');
      }
    },

    exportJSON() {
      const payload = { exportedAt: nowISO(), church: 'Mt. Calvary Missionary Baptist Church', children: state.children, attendance: state.attendance };
      download(`mt-calvary-children-${todayISO()}.json`, JSON.stringify(payload, null, 2), 'application/json');
      toast('Exported JSON backup');
    },

    exportCSV() {
      const headers = ['Full Name','Birthdate','Age','Grade','School','Parents','Phones','Emails','Preferred Contact','Allergies','Allergy Severity','Medical','Special Needs','Emergency Contact','Authorized Pickup','Photo Consent','Newsletter','Status','Membership','Classroom','Prayer Requests'];
      const rows = state.children.map(c => [c.fullName,c.birthdate,calcAge(c.birthdate),c.gradeLevel,c.school,c.parentNames,c.phoneNumbers,c.emails,c.preferredContact,c.allergies,c.allergySeverity,c.medicalConditions,c.specialNeeds,c.emergencyContact,c.authorizedPickup,c.photoConsent?'Yes':'No',c.newsletterOptIn?'Yes':'No',c.visitorStatus,c.churchMembership,c.classroom,c.prayerRequests]);
      const csvEsc = v => { const s = String(v ?? ''); return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s; };
      const csv = [headers, ...rows].map(r => r.map(csvEsc).join(',')).join('\n');
      download(`mt-calvary-roster-${todayISO()}.csv`, csv, 'text/csv');
      toast('Exported CSV roster');
    },

    importJSON(file) {
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.children) throw new Error('Invalid backup file');
          const msg = state.config
            ? `Import ${data.children.length} children and overwrite the Google Sheet? This cannot be undone.`
            : `Import ${data.children.length} children? This will replace current data.`;
          if (!confirm(msg)) return;
          state.children = data.children;
          state.attendance = data.attendance || [];
          saveCache();
          if (state.config) {
            await syncAction('bulkImport', { children: data.children, attendance: data.attendance || [] }, () => {});
          }
          toast('Imported successfully');
          render();
        } catch (err) { toast('Import failed: ' + err.message, 'error'); }
      };
      reader.readAsText(file);
    },

    toggleSettings() {
      state.showSettings = !state.showSettings;
      state.showUserMenu = false;
      render();
    }
  };

  function validateChild(c) {
    if (!c.fullName.trim()) return 'Child\'s full name is required';
    if (!c.parentNames.trim()) return 'Parent/guardian name is required';
    if (!c.phoneNumbers.trim() && !c.emails.trim()) return 'Provide a phone number or email';
    if (!c.emergencyContact.trim()) return 'Emergency contact is required for safety';
    return null;
  }

  function validateParent(p) {
    if (!p.fullName.trim()) return 'Parent/guardian full name is required';
    if (!p.phoneNumbers.trim() && !p.emails.trim()) return 'Provide a phone number or email';
    return null;
  }

  function download(filename, content, mime) {
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }

  // ---------- Dashboard ----------
  function renderDashboard() {
    const today = todayISO();
    const checkedInToday = state.attendance.filter(a => normalizeDate(a.date) === today);
    const presentNow = checkedInToday.filter(a => !a.checkOutAt);
    const checkedOutNow = checkedInToday.filter(a => a.checkOutAt);
    const withAllergies = state.children.filter(c => c.allergies && c.allergies.trim() && c.allergies.toLowerCase() !== 'none');
    const severe = state.children.filter(c => c.allergySeverity === 'Severe');
    const medical = state.children.filter(c => c.medicalConditions && c.medicalConditions.trim());
    const visitors = state.children.filter(c => c.visitorStatus === 'Visitor');

    // Last 4 weeks (28 days), grouped by date, only days that have attendance
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 28);
    const cutoffISO = cutoff.toISOString().slice(0, 10);
    const byDate = {};
    state.attendance.forEach(a => {
      const d = normalizeDate(a.date);
      if (!d || d < cutoffISO) return;
      if (!byDate[d]) byDate[d] = new Set();
      byDate[d].add(a.childId);
    });
    const childById = {};
    state.children.forEach(c => { childById[c.id] = c; });
    const days = Object.keys(byDate).sort().map(date => {
      const ids = Array.from(byDate[date]);
      const names = ids
        .map(id => childById[id] ? childById[id].fullName : null)
        .filter(Boolean)
        .sort((a, b) => a.localeCompare(b));
      // Anchor at noon UTC so the day-of-week matches the stored date regardless of TZ
      const dt = new Date(date + 'T12:00:00Z');
      const valid = !isNaN(dt.getTime());
      return {
        date,
        count: ids.length,
        names,
        dayLabel: valid ? dt.toLocaleDateString('en-US', { weekday: 'short', timeZone: 'UTC' }) : '',
        dateLabel: valid ? dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' }) : date
      };
    });
    const maxDay = Math.max(1, ...days.map(d => d.count));

    return `
      <div class="stack" style="gap:2rem;">
        <div style="text-align:center;padding:1.5rem 0;" class="anim-in">
          <div class="ornament" style="font-size:11px;letter-spacing:.3em;text-transform:uppercase;margin-bottom:.75rem;color:var(--terra);">Welcome</div>
