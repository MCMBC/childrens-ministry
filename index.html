            ${new Date().toLocaleDateString('en-US',{weekday:'long'})}, ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric'})}
            <span style="font-size:1.5rem;color:var(--ink-soft);font-weight:300;margin-left:.5rem;">· ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true})}</span>
          </h2>
          <p style="margin-top:.75rem;font-style:italic;color:var(--ink-soft);">Caring for ${state.children.length} little ${state.children.length === 1 ? 'one' : 'ones'} and counting blessings.</p>
        </div>

        <div class="grid-stats">
          ${statTile('users','Total Enrolled',state.children.length,'sage','')}
          ${statTile('check','Present Today',presentNow.length,'terra',`${checkedInToday.length} checked in${checkedOutNow.length > 0 ? ` · ${checkedOutNow.length} checked out` : ''}`)}
          ${statTile('alert','Allergy Alerts',withAllergies.length,'danger',`${severe.length} severe`)}
          ${statTile('sparkles','Visitors',visitors.length,'gold','')}
        </div>

        <div class="grid-actions">
          ${actionCard('user-plus','New Registration','Add a child &amp; guardians','new-child')}
          ${actionCard('clipboard',"Today's Check-In",'Check children in for today','goto-checkin')}
          ${actionCard('logout',"Today's Check-Out",'Check children out at pickup','goto-checkout')}
          ${actionCard('book','Full Roster – Children','Browse &amp; edit child records','goto-roster')}
          ${actionCard('users','Parent/Guardian Registration','Add a parent or guardian record','new-parent')}
          ${actionCard('book','Parents/Guardian Roster','Browse, edit &amp; remove parents','goto-parents')}
          ${isAdmin() ? actionCard('users','User Management','Add, edit &amp; reset users','goto-users') : ''}
          ${actionCard('sparkles','Coming Soon','Reports, audit log &amp; more','goto-coming-soon')}
        </div>

        <div style="display:grid;grid-template-columns:1fr;gap:1.5rem;" id="dash-bottom">
          <div class="card" style="padding:1.5rem;overflow:visible;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
              <div>
                <div class="label-text" style="color:var(--terra);">Last 4 Weeks</div>
                <h3 class="font-display" style="font-size:1.25rem;margin:.25rem 0 0;color:var(--ink);">Attendance</h3>
              </div>
              ${icon('calendar','icon')}
            </div>
            ${days.length === 0
              ? `<div class="chart-empty">No attendance recorded in the last 4 weeks.</div>`
              : `<div class="chart-bars">
                  ${days.map(d => `
                    <div class="chart-bar" tabindex="0" aria-label="${d.count} on ${esc(d.dayLabel)} ${esc(d.dateLabel)}">
                      <div class="chart-tooltip" role="tooltip">
                        <div class="chart-tooltip-header">${d.count} ${d.count === 1 ? 'child' : 'children'} · ${esc(d.dayLabel)}, ${esc(d.dateLabel)}</div>
                        <ul>
                          ${d.names.map(n => `<li>${esc(n)}</li>`).join('')}
                        </ul>
                      </div>
                      <div style="font-size:.75rem;font-weight:600;color:var(--ink);">${d.count}</div>
                      <div class="chart-bar-fill" style="height:${Math.max(4,(d.count/maxDay)*100)}%;background:linear-gradient(to top,var(--sage-dark),var(--sage));"></div>
                      <div style="font-size:10px;color:var(--ink-soft);font-weight:600;line-height:1.1;">${esc(d.dayLabel)}</div>
                      <div style="font-size:9px;color:var(--ink-soft);line-height:1.1;">${esc(d.dateLabel)}</div>
                    </div>
                  `).join('')}
                </div>`
            }
          </div>

          <div class="card" style="padding:1.5rem;">
            <div class="label-text" style="color:var(--danger);margin-bottom:.25rem;">Safety First</div>
            <h3 class="font-display" style="font-size:1.25rem;margin:0 0 1rem;color:var(--ink);">Active Alerts</h3>
            <div class="stack" style="gap:.75rem;">
              ${severe.slice(0,4).map(c => `
                <div style="padding:.75rem;border-radius:3px;background:var(--danger-bg);">
                  <div style="display:flex;align-items:flex-start;gap:.5rem;">
                    ${icon('alert','icon icon-sm')}
                    <div style="min-width:0;">
                      <div style="font-weight:600;font-size:.875rem;color:var(--ink);">${esc(c.fullName)}</div>
                      <div style="font-size:.75rem;color:var(--ink-soft);">Severe: ${esc(c.allergies)}</div>
                    </div>
                  </div>
                </div>
              `).join('')}
              ${medical.slice(0,2).map(c => `
                <div style="padding:.75rem;border-radius:3px;background:var(--cream-soft);">
                  <div style="display:flex;align-items:flex-start;gap:.5rem;">
                    ${icon('heart','icon icon-sm')}
                    <div style="min-width:0;">
                      <div style="font-weight:600;font-size:.875rem;color:var(--ink);">${esc(c.fullName)}</div>
                      <div style="font-size:.75rem;color:var(--ink-soft);">${esc(c.medicalConditions)}</div>
                    </div>
                  </div>
                </div>
              `).join('')}
              ${severe.length === 0 && medical.length === 0 ? `<p style="font-size:.875rem;font-style:italic;color:var(--ink-soft);">No active alerts. All records up to date.</p>` : ''}
            </div>
          </div>
        </div>

        <style>
          @media (min-width: 1024px) {
            #dash-bottom { grid-template-columns: 2fr 1fr !important; }
          }
        </style>
      </div>
    `;
  }

  function statTile(iconName, label, value, accent, sub) {
    const colors = {
      sage: {bg:'var(--sage-dark)',fg:'var(--cream-soft)'},
      terra: {bg:'var(--terra)',fg:'var(--cream-soft)'},
      danger: {bg:'var(--danger-bg)',fg:'var(--danger)'},
      gold: {bg:'var(--gold)',fg:'var(--ink)'}
    }[accent];
    return `
      <div class="card anim-in" style="padding:1.25rem;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;">
          <div class="label-text" style="color:var(--ink-soft);">${esc(label)}</div>
          <div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${colors.bg};color:${colors.fg};">${icon(iconName,'icon icon-sm')}</div>
        </div>
        <div class="font-display" style="font-size:2.25rem;font-weight:300;color:var(--ink);">${value}</div>
        ${sub ? `<div style="font-size:.75rem;margin-top:.25rem;color:var(--ink-soft);">${esc(sub)}</div>` : ''}
      </div>
    `;
  }

  function actionCard(iconName, title, desc, action) {
    return `
      <button class="card btn" style="padding:1.25rem;text-align:left;border-left:3px solid var(--terra);" data-action="${action}">
        <div style="display:flex;align-items:flex-start;gap:1rem;">
          <div style="width:44px;height:44px;border-radius:50%;background:var(--cream);color:var(--sage-dark);display:flex;align-items:center;justify-content:center;flex-shrink:0;">${icon(iconName,'icon icon-lg')}</div>
          <div>
            <h3 class="font-display" style="font-size:1.125rem;font-weight:600;color:var(--ink);margin:0;">${title}</h3>
            <p style="font-size:.875rem;margin:.125rem 0 0;color:var(--ink-soft);">${desc}</p>
          </div>
        </div>
      </button>
    `;
  }

  // ---------- Roster ----------
  function renderRoster() {
    const q = state.search.toLowerCase().trim();
    const filtered = q ? state.children.filter(c =>
      c.fullName.toLowerCase().includes(q) ||
      (c.parentNames||'').toLowerCase().includes(q) ||
      (c.classroom||'').toLowerCase().includes(q) ||
      (c.gradeLevel||'').toLowerCase().includes(q)
    ) : state.children;

    return `
      <div class="anim-in">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;">
          <div>
            <div class="label-text" style="color:var(--terra);">Ministry Records</div>
            <h2 class="font-display" style="font-size:1.875rem;margin:.25rem 0 0;color:var(--ink);">Children's Roster</h2>
          </div>
          <div style="display:flex;gap:.5rem;">
            <button class="btn btn-ghost" style="padding:.5rem .75rem;font-size:.875rem;display:flex;align-items:center;gap:.375rem;" data-action="export-csv">${icon('download','icon icon-sm')} CSV</button>
            <button class="btn btn-primary" style="padding:.5rem 1rem;font-size:.875rem;font-weight:600;display:flex;align-items:center;gap:.5rem;border-radius:3px;" data-action="new-child">${icon('user-plus','icon icon-sm')} Add Child</button>
          </div>
        </div>

        <div style="position:relative;margin-bottom:1.25rem;">
          <span style="position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--ink-soft);">${icon('search','icon icon-sm')}</span>
          <input class="input-field" style="padding-left:2.5rem;" placeholder="Search by name, parent, or classroom…" value="${esc(state.search)}" data-action="search-roster">
        </div>

        ${filtered.length === 0 ? `
          <div class="card" style="padding:3rem;text-align:center;">
            ${icon('baby','icon')}
            <p class="font-display" style="font-size:1.25rem;color:var(--ink);margin:.75rem 0 .25rem;">No children match your search.</p>
            <p style="font-size:.875rem;color:var(--ink-soft);">Try a different term, or add a new record.</p>
          </div>
        ` : `
          <div class="grid-roster">
            ${filtered.map(childCard).join('')}
          </div>
        `}
      </div>
    `;
  }

  function childCard(c) {
    const hasAlert = c.allergySeverity === 'Severe' || (c.medicalConditions && c.medicalConditions.trim());
    const pills = [];
    if (c.visitorStatus === 'Member') pills.push('<span class="pill pill-sage">Member</span>');
    if (c.visitorStatus === 'Visitor') pills.push('<span class="pill pill-gold">Visitor</span>');
    if (c.allergySeverity === 'Severe') pills.push('<span class="pill pill-danger">⚠ Severe Allergy</span>');
    else if (c.allergySeverity === 'Mild' || c.allergySeverity === 'Moderate') pills.push(`<span class="pill pill-terra">${esc(c.allergySeverity)} Allergy</span>`);
    return `
      <button class="card btn anim-in" style="padding:1.25rem;text-align:left;border-left:3px solid ${hasAlert?'var(--danger)':'var(--sage)'};" data-action="view-child" data-id="${c.id}">
        <div style="display:flex;align-items:flex-start;gap:1rem;">
          <div class="avatar">${initials(c.fullName)}</div>
          <div style="min-width:0;flex:1;">
            <h3 class="font-display" style="font-weight:600;font-size:1.125rem;color:var(--ink);margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.fullName)}</h3>
            <div style="font-size:.75rem;color:var(--ink-soft);margin-top:.125rem;">
              ${calcAge(c.birthdate) ? calcAge(c.birthdate) + ' yrs · ' : ''}${esc(c.gradeLevel || 'No grade')}${c.classroom ? ' · ' + esc(c.classroom) : ''}
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:.375rem;margin-top:.75rem;">${pills.join('')}</div>
          </div>
        </div>
      </button>
    `;
  }

  // ---------- Child Detail ----------
  function renderChildDetail() {
    const c = state.children.find(x => x.id === state.selectedId);
    if (!c) { state.view = 'roster'; return renderRoster(); }
    const att = state.attendance.filter(a => a.childId === c.id);
    const hasAlert = c.allergySeverity === 'Severe' || (c.medicalConditions && c.medicalConditions.trim());

    const pills = [];
    if (c.visitorStatus) pills.push(`<span class="pill pill-${c.visitorStatus === 'Member' ? 'sage' : 'gold'}">${esc(c.visitorStatus)}</span>`);
    if (c.classroom) pills.push(`<span class="pill pill-terra">${esc(c.classroom)}</span>`);

    return `
      <div class="anim-in" style="max-width:56rem;margin:0 auto;">
        <button class="btn" style="background:transparent;font-size:.875rem;margin-bottom:1rem;display:flex;align-items:center;gap:.25rem;color:var(--ink-soft);" data-action="goto-roster">${icon('arrow-left','icon icon-sm')} Back to roster</button>

        ${hasAlert ? `
          <div style="margin-bottom:1.25rem;padding:1rem;border-radius:3px;border-left:4px solid var(--danger);background:var(--danger-bg);display:flex;align-items:flex-start;gap:.75rem;">
            ${icon('alert','icon icon-lg')}
            <div>
              <div class="font-display" style="font-weight:600;color:var(--danger);">Safety Alert</div>
              <div style="font-size:.875rem;margin-top:.25rem;color:var(--ink);">
                ${c.allergySeverity === 'Severe' ? `<div><strong>Severe allergy:</strong> ${esc(c.allergies)}</div>` : ''}
                ${c.medicalConditions ? `<div><strong>Medical:</strong> ${esc(c.medicalConditions)}</div>` : ''}
              </div>
            </div>
          </div>
        ` : ''}

        <div class="card" style="padding:1.75rem;margin-bottom:1.25rem;">
          <div style="display:flex;align-items:flex-start;gap:1.25rem;flex-wrap:wrap;">
            <div class="avatar avatar-lg">${initials(c.fullName)}</div>
            <div style="flex:1;min-width:0;">
              <h2 class="font-display" style="font-size:1.875rem;font-weight:600;color:var(--ink);margin:0;">${esc(c.fullName)}</h2>
              <div style="display:flex;flex-wrap:wrap;gap:.25rem 1rem;margin-top:.5rem;font-size:.875rem;color:var(--ink-soft);">
                ${c.birthdate ? `<span>Born ${fmtDate(c.birthdate)} · Age ${calcAge(c.birthdate)}</span>` : ''}
                ${c.gradeLevel ? `<span>${esc(c.gradeLevel)}</span>` : ''}
                ${c.school ? `<span>${esc(c.school)}</span>` : ''}
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:.375rem;margin-top:.75rem;">${pills.join('')}</div>
            </div>
            <div style="display:flex;gap:.5rem;">
              <button class="btn btn-terra" style="padding:.5rem .75rem;font-size:.875rem;display:flex;align-items:center;gap:.375rem;border-radius:3px;" data-action="checkin-child" data-id="${c.id}">${icon('login','icon icon-sm')} Check In</button>
              <button class="btn btn-ghost" style="padding:.5rem .75rem;font-size:.875rem;display:flex;align-items:center;gap:.375rem;" data-action="edit-child" data-id="${c.id}">${icon('edit','icon icon-sm')} Edit</button>
            </div>
          </div>
        </div>

        <div class="grid-detail">
          ${(c.parentIds || []).length > 0 ? `
            <div class="card" style="padding:1.25rem;margin-bottom:1.25rem;">
              <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.875rem;">
                ${icon('users','icon icon-sm')}
                <h3 class="font-display" style="font-size:1.1rem;margin:0;color:var(--ink);">Linked Parents/Guardians</h3>
              </div>
              <div style="display:flex;flex-direction:column;gap:.5rem;">
                ${c.parentIds.map(pid => {
                  const p = state.parents.find(x => x.id === pid);
                  if (!p) return `<div style="font-size:.8rem;color:var(--ink-soft);font-style:italic;">[Linked parent record no longer exists]</div>`;
                  const auth = p.authorizedForPickup !== false;
                  const rel = p.relationship || 'Parent';
                  return `
                    <div style="display:flex;align-items:center;gap:.5rem;padding:.625rem .75rem;border-radius:3px;background:var(--cream-soft);border-left:3px solid ${auth ? 'var(--sage)' : 'var(--danger)'};">
                      <div style="flex:1;min-width:0;">
                        <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;">
                          <span style="font-weight:600;color:var(--ink);">${esc(p.fullName)}</span>
                          <span style="font-size:.65rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:.125rem .375rem;border-radius:2px;background:var(--paper);color:var(--ink-soft);">${esc(rel)}</span>
                          ${auth
                            ? `<span style="font-size:.65rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:.125rem .375rem;border-radius:2px;background:var(--sage-dark);color:var(--cream-soft);">✓ Authorized</span>`
                            : `<span style="font-size:.65rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:.125rem .375rem;border-radius:2px;background:var(--danger);color:var(--cream-soft);">✗ Not Authorized</span>`
                          }
                        </div>
                        <div style="font-size:.75rem;color:var(--ink-soft);margin-top:.25rem;">
                          ${p.phoneNumbers ? esc(p.phoneNumbers) : ''}${p.phoneNumbers && p.emails ? ' · ' : ''}${p.emails ? esc(p.emails) : ''}
                        </div>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          ` : ''}
          ${detailSection('Parent &amp; Guardian', 'phone', [
            ['Names', c.parentNames],
            ['Phone', c.phoneNumbers],
            ['Email', c.emails],
            ['Preferred Contact', c.preferredContact]
          ])}
          ${detailSection('Safety &amp; Medical', 'shield', [
            ['Allergies', c.allergies ? `${esc(c.allergies)} (${esc(c.allergySeverity)})` : '', true],
            ['Medical Conditions', c.medicalConditions],
            ['Special Needs', c.specialNeeds],
            ['Emergency Contact', c.emergencyContact],
            ['Authorized Pick-Up', c.authorizedPickup]
          ])}
          ${detailSection('Communication &amp; Permissions', 'mail', [
            ['Photo/Media Consent', c.photoConsent ? '✓ Yes' : '✗ No'],
            ['Newsletter Opt-In', c.newsletterOptIn ? '✓ Yes' : '✗ No']
          ])}
          ${detailSection('Ministry &amp; Engagement', 'heart', [
            ['Status', c.visitorStatus],
            ['Church Membership', c.churchMembership],
            ['Prayer Requests', c.prayerRequests]
          ])}
        </div>

        <div class="card" style="padding:1.5rem;margin-top:1.25rem;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
            <div>
              <div class="label-text" style="color:var(--terra);">History</div>
              <h3 class="font-display" style="font-size:1.25rem;margin:0;color:var(--ink);">Attendance Record</h3>
            </div>
            <span style="font-size:.875rem;color:var(--ink-soft);">${att.length} visits</span>
          </div>
          ${att.length === 0
            ? `<p style="font-size:.875rem;font-style:italic;color:var(--ink-soft);">No attendance recorded yet.</p>`
            : `<div style="max-height:16rem;overflow-y:auto;">
                ${att.slice(0,15).map(a => `
                  <div style="display:flex;align-items:center;justify-content:space-between;font-size:.875rem;padding:.5rem 0;border-bottom:1px solid var(--divider);">
                    <div>
                      <span style="font-weight:600;color:var(--ink);">${fmtDate(a.date)}</span>
                      ${a.classroom ? `<span style="margin-left:.5rem;color:var(--ink-soft);">· ${esc(a.classroom)}</span>` : ''}
                    </div>
                    <div style="font-size:.75rem;color:var(--ink-soft);">
                      In: ${fmtTime(a.checkInAt)}${a.checkOutAt ? ` · Out: ${fmtTime(a.checkOutAt)}` : ''}
                    </div>
                  </div>
                `).join('')}
              </div>`
          }
        </div>

        ${isAdmin() ? `<div style="margin-top:2rem;display:flex;justify-content:flex-end;">
          <button class="btn-danger" style="font-size:.875rem;display:flex;align-items:center;gap:.375rem;" data-action="delete-child" data-id="${c.id}">${icon('trash','icon icon-sm')} Remove child from roster</button>
        </div>` : ''}
      </div>
    `;
  }

  function detailSection(title, iconName, rows) {
    return `
      <div class="card" style="padding:1.5rem;">
        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;">
          ${icon(iconName,'icon')}
          <h3 class="font-display" style="font-size:1.125rem;font-weight:600;color:var(--ink);margin:0;">${title}</h3>
        </div>
        <div class="stack" style="gap:.625rem;">
          ${rows.map(([label, value, html]) => `
            <div>
              <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);">${esc(label)}</div>
              <div style="font-size:.875rem;margin-top:.125rem;color:var(--ink);">${value ? (html ? value : esc(value)) : '<span style="font-style:italic;color:var(--ink-soft);">—</span>'}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  // ---------- Form ----------
  function renderForm() {
    const c = state.editing || emptyChild();
    const isNew = !c.id;
    return `
      <form class="anim-in" style="max-width:56rem;margin:0 auto;" id="child-form">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
          <div>
            <div class="label-text" style="color:var(--terra);">${isNew ? 'New Registration' : 'Editing'}</div>
            <h2 class="font-display" style="font-size:1.875rem;margin:.25rem 0 0;color:var(--ink);">${isNew ? 'Add a Child' : esc(c.fullName)}</h2>
          </div>
          <button type="button" class="btn btn-ghost" style="padding:.5rem .75rem;font-size:.875rem;" data-action="cancel-form">Cancel</button>
        </div>

        ${formSection('Child Information', `
          ${field('fullName','Full Name','text',c.fullName,{required:true})}
          <div style="display:grid;grid-template-columns:1fr;gap:1rem;" class="two-col">
            ${field('birthdate','Birthdate','date',c.birthdate,{hint:'Format: MM/DD/YYYY'})}
            <div>
              <label class="label-text" style="display:flex;align-items:center;gap:.25rem;margin-bottom:.375rem;">Age</label>
              <input class="input-field" value="${calcAge(c.birthdate) || ''}" disabled placeholder="From birthdate" id="age-display">
              ${c.birthdate ? `<div style="font-size:.75rem;margin-top:.25rem;color:var(--ink-soft);">Calculated automatically</div>` : ''}
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr;gap:1rem;" class="two-col">
            ${field('gradeLevel','Grade Level','text',c.gradeLevel,{placeholder:'e.g. Pre-K, 2nd Grade'})}
            ${field('school','School','text',c.school)}
          </div>
          ${field('classroom','Classroom Assignment','text',c.classroom,{placeholder:'e.g. Lambs, Little Lights'})}
        `)}

        ${formSection('Parent / Guardian', `
          <div>
            <label class="label-text" style="display:block;margin-bottom:.375rem;">Linked Parent/Guardian Records</label>
            ${(c.parentIds || []).length > 0
              ? `<div style="display:flex;flex-direction:column;gap:.375rem;margin-bottom:.5rem;">
                  ${c.parentIds.map(pid => {
                    const p = state.parents.find(x => x.id === pid);
                    if (!p) return '';
                    const auth = p.authorizedForPickup !== false;
                    const rel = p.relationship || 'Parent';
                    return `
                      <div style="display:flex;align-items:center;gap:.5rem;padding:.5rem .625rem;border-radius:3px;background:var(--cream-soft);border:1px solid var(--divider);">
                        <span style="font-weight:600;font-size:.875rem;color:var(--ink);flex:1;min-width:0;">${esc(p.fullName)}</span>
                        <span style="font-size:.65rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:.125rem .375rem;border-radius:2px;background:var(--paper);color:var(--ink-soft);">${esc(rel)}</span>
                        ${auth
                          ? `<span style="font-size:.65rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:.125rem .375rem;border-radius:2px;background:var(--sage-dark);color:var(--cream-soft);">✓ Auth</span>`
                          : `<span style="font-size:.65rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:.125rem .375rem;border-radius:2px;background:var(--danger);color:var(--cream-soft);">Not Auth</span>`
                        }
                        <button type="button" class="btn" style="padding:.25rem .5rem;font-size:.75rem;background:transparent;color:var(--ink-soft);" data-action="unlink-parent" data-id="${esc(p.id)}" title="Remove link">✕</button>
                      </div>
                    `;
                  }).join('')}
                </div>`
              : `<p style="font-size:.8rem;color:var(--ink-soft);margin:0 0 .5rem;font-style:italic;">No parents linked yet. Link an existing record below, or fill in the name fields if no parent record exists.</p>`
            }
            ${(() => {
              const linkedSet = new Set(c.parentIds || []);
              const available = (state.parents || []).filter(p => !linkedSet.has(p.id));
              if (available.length === 0 && (c.parentIds||[]).length === 0) return '';
              return available.length > 0 ? `
                <select class="input-field" data-action="link-parent">
                  <option value="">— Link an existing parent/guardian —</option>
                  ${[...available].sort((a,b) => (a.fullName||'').localeCompare(b.fullName||'')).map(p =>
                    `<option value="${esc(p.id)}">${esc(p.fullName)}${p.relationship ? ' (' + esc(p.relationship) + ')' : ''}${p.authorizedForPickup === false ? ' — not authorized' : ''}</option>`
                  ).join('')}
                </select>
                <p style="font-size:.75rem;color:var(--ink-soft);margin:.375rem 0 0;font-style:italic;">Linked parents will auto-fill the name/contact fields below if they're empty.</p>
              ` : `<p style="font-size:.75rem;color:var(--ink-soft);margin:.5rem 0 0;font-style:italic;">All registered parents are already linked. Register more from the Parent/Guardian Roster.</p>`;
            })()}
          </div>
          <div style="border-top:1px solid var(--divider);padding-top:1rem;margin-top:1rem;">
            ${field('parentNames','Names','text',c.parentNames,{required:true,hint:'Comma-separated. Auto-filled when linking parents above.'})}
            <div style="display:grid;grid-template-columns:1fr;gap:1rem;margin-top:.75rem;" class="two-col">
              ${field('phoneNumbers','Phone Numbers','text',c.phoneNumbers,{required:true,hint:'Format: (555) 123-4567 — separate multiple with commas'})}
              ${field('emails','Emails','email',c.emails)}
            </div>
            <div style="margin-top:.75rem;">
              <label class="label-text" style="display:block;margin-bottom:.375rem;">Preferred Contact Method</label>
              <div style="display:flex;gap:.5rem;">
                ${['Phone','Text','Email'].map(opt => `
                  <button type="button" class="btn" data-action="set-preferred" data-value="${opt}" style="padding:.5rem 1rem;font-size:.875rem;border-radius:3px;flex:1;border:1px solid var(--divider);background:${c.preferredContact===opt?'var(--sage-dark)':'var(--cream-soft)'};color:${c.preferredContact===opt?'var(--cream-soft)':'var(--ink)'};">${opt}</button>
                `).join('')}
              </div>
            </div>
          </div>
        `)}

        ${formSection('Safety &amp; Medical', `
          <div style="display:grid;grid-template-columns:1fr;gap:1rem;" class="allergy-grid">
            ${field('allergies','Allergies','text',c.allergies,{placeholder:'e.g. Peanuts — EpiPen in bag',hint:'Type & action if needed'})}
            <div>
              <label class="label-text" style="display:block;margin-bottom:.375rem;">Severity</label>
              <select class="input-field" name="allergySeverity">
                ${['None','Mild','Moderate','Severe'].map(o => `<option value="${o}"${c.allergySeverity===o?' selected':''}>${o}</option>`).join('')}
              </select>
            </div>
          </div>
          ${field('medicalConditions','Medical Conditions','textarea',c.medicalConditions)}
          ${field('specialNeeds','Special Needs / Accommodations','textarea',c.specialNeeds)}
          ${field('emergencyContact','Emergency Contact','text',c.emergencyContact,{required:true,hint:'Name & phone of someone other than the parent — phone format: (555) 123-4567'})}
          ${field('authorizedPickup','Authorized Pick-Up List','textarea',c.authorizedPickup,{hint:'Names of anyone allowed to collect the child'})}
        `, 'danger')}

        ${formSection('Communication &amp; Permissions', `
          <div class="stack" style="gap:.75rem;">
            ${toggle('photoConsent','Photo / Media Consent','May we use photos in ministry communications?',c.photoConsent)}
            ${toggle('newsletterOptIn','Newsletter Signup','Send occasional ministry updates',c.newsletterOptIn)}
          </div>
        `)}

        ${formSection('Ministry &amp; Engagement', `
          <div>
            <label class="label-text" style="display:block;margin-bottom:.375rem;">Member or Visitor Status</label>
            <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
              ${['Member','Visitor'].map(opt => `
                <button type="button" class="btn" data-action="set-status" data-value="${opt}" style="padding:.5rem 1rem;font-size:.875rem;border-radius:3px;flex:1;min-width:8rem;border:1px solid var(--divider);background:${c.visitorStatus===opt?'var(--sage-dark)':'var(--cream-soft)'};color:${c.visitorStatus===opt?'var(--cream-soft)':'var(--ink)'};">${opt}</button>
              `).join('')}
            </div>
          </div>
          ${field('churchMembership','Church Membership','text',c.churchMembership,{hint:'Home church, if any'})}
          ${field('prayerRequests','Prayer Requests','textarea',c.prayerRequests)}
        `)}

        <div style="position:sticky;bottom:0;padding:1rem 0;border-top:1px solid var(--divider);display:flex;gap:.75rem;justify-content:flex-end;background:var(--cream);">
          <button type="button" class="btn btn-ghost" style="padding:.625rem 1.25rem;" data-action="cancel-form">Cancel</button>
          <button type="submit" class="btn btn-primary" style="padding:.625rem 1.5rem;font-weight:600;border-radius:3px;display:flex;align-items:center;gap:.5rem;">${icon('check','icon icon-sm')} ${isNew ? 'Add to Roster' : 'Save Changes'}</button>
        </div>

        <style>
          @media (min-width: 640px) {
            .two-col, .allergy-grid { grid-template-columns: repeat(2, 1fr) !important; }
            .allergy-grid { grid-template-columns: 2fr 1fr !important; }
          }
        </style>
      </form>
    `;
  }

  function formSection(title, content, accent) {
    return `
      <div class="card" style="padding:1.5rem;margin-bottom:1.25rem;${accent==='danger'?'border-left:3px solid var(--danger);':''}">
        <h3 class="font-display" style="font-size:1.25rem;font-weight:600;margin:0 0 1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--divider);color:var(--ink);">${title}</h3>
        <div class="stack">${content}</div>
      </div>
    `;
  }

  function field(name, label, type, value, opts={}) {
    const req = opts.required ? '<span style="color:var(--terra);">*</span>' : '';
    const placeholder = opts.placeholder ? ` placeholder="${esc(opts.placeholder)}"` : '';
    const hint = opts.hint ? `<div style="font-size:.75rem;margin-top:.25rem;color:var(--ink-soft);">${esc(opts.hint)}</div>` : '';
    const input = type === 'textarea'
      ? `<textarea class="input-field" name="${name}" rows="2"${placeholder}>${esc(value || '')}</textarea>`
      : `<input class="input-field" name="${name}" type="${type}" value="${esc(value || '')}"${placeholder}>`;
    return `
      <div>
        <label class="label-text" style="display:flex;align-items:center;gap:.25rem;margin-bottom:.375rem;">${esc(label)} ${req}</label>
        ${input}
        ${hint}
      </div>
    `;
  }

  function toggle(name, label, desc, checked) {
    return `
      <button type="button" class="btn" data-action="toggle" data-name="${name}" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:.75rem;border-radius:3px;text-align:left;background:var(--cream-soft);border:1px solid var(--divider);">
        <div>
          <div style="font-weight:600;font-size:.875rem;color:var(--ink);">${esc(label)}</div>
          <div style="font-size:.75rem;color:var(--ink-soft);">${esc(desc)}</div>
        </div>
        <div style="width:44px;height:24px;border-radius:999px;padding:2px;flex-shrink:0;background:${checked?'var(--sage-dark)':'var(--divider)'};">
          <div style="width:20px;height:20px;border-radius:50%;background:var(--cream-soft);transition:transform .2s;transform:translateX(${checked?'20px':'0'});"></div>
        </div>
        <input type="hidden" name="${name}" value="${checked?'true':'false'}">
      </button>
    `;
  }

  // ---------- Check-in ----------
  function renderCheckin() {
    const today = todayISO();
    const todayRecords = state.attendance.filter(a => normalizeDate(a.date) === today);
    const activeToday = todayRecords.filter(a => !a.checkOutAt);
    const presentIds = new Set(activeToday.map(a => a.childId));
    const q = state.checkinSearch.toLowerCase().trim();
    const available = state.children.filter(c => {
      if (presentIds.has(c.id)) return false;
      if (!q) return true;
      return c.fullName.toLowerCase().includes(q) || (c.parentNames||'').toLowerCase().includes(q);
    });

    return `
      <div class="anim-in">
        <div style="margin-bottom:1.5rem;">
          <div class="label-text" style="color:var(--terra);">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
          <h2 class="font-display" style="font-size:1.875rem;margin:.25rem 0 0;color:var(--ink);">Check-In Station</h2>
        </div>

        <div class="card" style="padding:1.5rem;margin-bottom:1.25rem;border-left:3px solid var(--terra);">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
            <h3 class="font-display" style="font-size:1.25rem;margin:0;color:var(--ink);">Present Now <span style="font-size:.875rem;font-family:'Lora',serif;font-weight:400;color:var(--ink-soft);">· ${activeToday.length}</span></h3>
          </div>
          ${activeToday.length === 0
            ? `<p style="font-size:.875rem;font-style:italic;color:var(--ink-soft);">No children currently checked in.</p>`
            : `<div class="grid-checkin" style="max-height:none;">
                ${activeToday.map(rec => {
                  const c = state.children.find(x => x.id === rec.childId);
                  if (!c) return '';
                  const hasAlert = c.allergySeverity === 'Severe' || (c.medicalConditions && c.medicalConditions.trim());
                  return `
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:.75rem;border-radius:3px;background:var(--cream-soft);">
                      <div style="display:flex;align-items:center;gap:.5rem;min-width:0;">
                        ${hasAlert ? icon('alert','icon icon-sm') : ''}
                        <div style="min-width:0;">
                          <div style="font-weight:600;font-size:.875rem;color:var(--ink);">${esc(c.fullName)}</div>
                          <div style="font-size:.75rem;color:var(--ink-soft);">In at ${fmtTime(rec.checkInAt)}</div>
                        </div>
                      </div>
                      <button class="btn btn-ghost" style="padding:.375rem .625rem;font-size:.75rem;display:flex;align-items:center;gap:.25rem;flex-shrink:0;" data-action="check-out" data-id="${rec.id}">${icon('logout','icon icon-sm')} Out</button>
                    </div>
                  `;
                }).join('')}
              </div>`
          }
        </div>

        <div class="card" style="padding:1.5rem;">
          <h3 class="font-display" style="font-size:1.25rem;margin:0 0 1rem;color:var(--ink);">Check In a Child</h3>
          <div style="position:relative;margin-bottom:1rem;">
            <span style="position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--ink-soft);">${icon('search','icon icon-sm')}</span>
            <input class="input-field" style="padding-left:2.5rem;" placeholder="Search by name or parent…" value="${esc(state.checkinSearch)}" data-action="search-checkin">
          </div>
          ${available.length === 0
            ? `<p style="font-size:.875rem;font-style:italic;color:var(--ink-soft);">${state.children.length === 0 ? 'No children in the roster yet. Add one from the Roster tab.' : 'All children are currently checked in, or none match your search.'}</p>`
            : `<div class="grid-checkin">
                ${available.map(c => {
                  const hasAlert = c.allergySeverity === 'Severe' || (c.medicalConditions && c.medicalConditions.trim());
                  return `
                    <button class="btn" style="display:flex;align-items:center;justify-content:space-between;padding:.75rem;border-radius:3px;text-align:left;background:var(--paper);border:1px solid var(--divider);" data-action="check-in" data-id="${c.id}">
                      <div style="display:flex;align-items:center;gap:.5rem;min-width:0;">
                        ${hasAlert ? icon('alert','icon icon-sm') : ''}
                        <div style="min-width:0;">
                          <div style="font-weight:600;font-size:.875rem;color:var(--ink);">${esc(c.fullName)}</div>
                          <div style="font-size:.75rem;color:var(--ink-soft);">${esc(c.gradeLevel || '—')}${c.classroom ? ' · ' + esc(c.classroom) : ''}</div>
                        </div>
                      </div>
                      ${icon('login','icon icon-sm')}
                    </button>
                  `;
                }).join('')}
              </div>`
          }
        </div>
      </div>
    `;
  }

  // ---------- Check-out ----------
  function renderCheckout() {
    const today = todayISO();
    const activeToday = state.attendance.filter(a => normalizeDate(a.date) === today && !a.checkOutAt);
    const checkedOutToday = state.attendance
      .filter(a => normalizeDate(a.date) === today && a.checkOutAt)
      .sort((a, b) => (b.checkOutAt || '').localeCompare(a.checkOutAt || ''));

    return `
      <div class="anim-in">
        <div style="margin-bottom:1.5rem;">
          <div class="label-text" style="color:var(--terra);">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
          <h2 class="font-display" style="font-size:1.875rem;margin:.25rem 0 0;color:var(--ink);">Check-Out Station</h2>
        </div>

        <div class="card" style="padding:1.5rem;margin-bottom:1.25rem;border-left:3px solid var(--terra);">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
            <h3 class="font-display" style="font-size:1.25rem;margin:0;color:var(--ink);">Ready to Check Out <span style="font-size:.875rem;font-family:'Lora',serif;font-weight:400;color:var(--ink-soft);">· ${activeToday.length}</span></h3>
          </div>
          ${activeToday.length === 0
            ? `<p style="font-size:.875rem;font-style:italic;color:var(--ink-soft);">No children currently checked in. Head to Check-In to get started.</p>`
            : `<div style="display:flex;flex-direction:column;gap:1rem;">
                ${activeToday.map(rec => {
                  const c = state.children.find(x => x.id === rec.childId);
                  if (!c) return '';
                  const hasAlert = c.allergySeverity === 'Severe' || (c.medicalConditions && c.medicalConditions.trim());
                  // Find authorized linked parents (excluding ones marked "not authorized")
                  const linkedParents = (c.parentIds || [])
                    .map(pid => state.parents.find(p => p.id === pid))
                    .filter(Boolean);
                  const authorizedParents = linkedParents.filter(p => p.authorizedForPickup !== false);
                  const showingOtherInput = state.checkoutOtherFor === rec.id;
                  return `
                    <div style="padding:1rem;border-radius:3px;background:var(--cream-soft);border-left:3px solid ${hasAlert ? 'var(--danger)' : 'var(--sage)'};">
                      <div style="display:flex;align-items:flex-start;gap:.625rem;margin-bottom:.75rem;">
                        ${hasAlert ? icon('alert','icon icon-sm') : ''}
                        <div style="min-width:0;flex:1;">
                          <div style="font-weight:600;font-size:1rem;color:var(--ink);">${esc(c.fullName)}</div>
                          <div style="font-size:.75rem;color:var(--ink-soft);">In at ${fmtTime(rec.checkInAt)}${c.classroom ? ' · ' + esc(c.classroom) : ''}</div>
                          ${c.authorizedPickup ? `<div style="font-size:.7rem;color:var(--ink-soft);margin-top:.125rem;font-style:italic;">Pickup notes: ${esc(c.authorizedPickup)}</div>` : ''}
                        </div>
                      </div>
                      <div style="font-size:.75rem;color:var(--ink-soft);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:.5rem;">Releasing to:</div>
                      ${authorizedParents.length > 0
                        ? `<div style="display:flex;flex-wrap:wrap;gap:.375rem;margin-bottom:.5rem;">
                            ${authorizedParents.map(p => `
                              <button class="btn btn-terra" style="padding:.5rem .75rem;font-size:.85rem;display:flex;align-items:center;gap:.375rem;border-radius:3px;" data-action="checkout-with" data-rec-id="${esc(rec.id)}" data-parent-id="${esc(p.id)}">${icon('logout','icon icon-sm')} ${esc(p.fullName)} <span style="font-size:.65rem;opacity:.85;font-weight:400;">(${esc(p.relationship || 'Parent')})</span></button>
                            `).join('')}
                          </div>`
                        : `<div style="padding:.625rem;border-radius:3px;background:var(--paper);font-size:.8rem;color:var(--ink-soft);font-style:italic;margin-bottom:.5rem;">
                            ${linkedParents.length > 0
                              ? `${linkedParents.length} linked parent(s) but none marked authorized. Use "Other" below or update authorization on the parent record.`
                              : `No parent records linked to this child. Use "Other" below to specify, or link parents on the child's registration.`
                            }
                          </div>`
                      }
                      ${showingOtherInput
                        ? `<div style="display:flex;gap:.375rem;align-items:center;flex-wrap:wrap;">
                            <input class="input-field" style="flex:1;min-width:10rem;padding:.5rem .625rem;font-size:.85rem;" placeholder="Name of person picking up" data-action="checkout-other-input" data-rec-id="${esc(rec.id)}" value="${esc(state.checkoutOtherName || '')}">
                            <button class="btn btn-terra" style="padding:.5rem .75rem;font-size:.85rem;border-radius:3px;" data-action="checkout-confirm-other" data-rec-id="${esc(rec.id)}">Confirm</button>
                            <button class="btn btn-ghost" style="padding:.5rem .75rem;font-size:.85rem;" data-action="checkout-cancel-other">Cancel</button>
                          </div>`
                        : `<button class="btn btn-ghost" style="padding:.375rem .625rem;font-size:.8rem;color:var(--ink-soft);" data-action="checkout-other" data-rec-id="${esc(rec.id)}">+ Other authorized adult…</button>`
                      }
                    </div>
                  `;
                }).join('')}
              </div>`
          }
        </div>

        <div class="card" style="padding:1.5rem;">
          <h3 class="font-display" style="font-size:1.25rem;margin:0 0 1rem;color:var(--ink);">Already Checked Out <span style="font-size:.875rem;font-family:'Lora',serif;font-weight:400;color:var(--ink-soft);">· ${checkedOutToday.length}</span></h3>
          ${checkedOutToday.length === 0
            ? `<p style="font-size:.875rem;font-style:italic;color:var(--ink-soft);">No check-outs yet today.</p>`
            : `<div class="grid-checkin" style="max-height:none;">
                ${checkedOutToday.map(rec => {
                  const c = state.children.find(x => x.id === rec.childId);
                  if (!c) return '';
                  // checkOutBy may be a parent ID (linked record) or a free-text name (legacy/other)
                  let pickedUpBy = '';
                  if (rec.checkOutBy) {
                    const p = state.parents.find(x => x.id === rec.checkOutBy);
                    pickedUpBy = p ? p.fullName : rec.checkOutBy; // fallback to raw value if not a parent ID
                  }
                  return `
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:.75rem;border-radius:3px;background:var(--paper);border:1px solid var(--divider);">
                      <div style="min-width:0;">
                        <div style="font-weight:600;font-size:.875rem;color:var(--ink);">${esc(c.fullName)}</div>
                        <div style="font-size:.75rem;color:var(--ink-soft);">In ${fmtTime(rec.checkInAt)} · Out ${fmtTime(rec.checkOutAt)}${pickedUpBy ? ' · Released to ' + esc(pickedUpBy) : ''}</div>
                      </div>
                      ${icon('check','icon icon-sm')}
                    </div>
                  `;
                }).join('')}
              </div>`
          }
        </div>
      </div>
    `;
  }

  // ---------- Parents / Guardians ----------
  function renderParents() {
    const q = state.parentSearch.toLowerCase().trim();
    const filtered = q ? state.parents.filter(p =>
      p.fullName.toLowerCase().includes(q) ||
      (p.phoneNumbers||'').toLowerCase().includes(q) ||
      (p.emails||'').toLowerCase().includes(q) ||
      (p.churchMembership||'').toLowerCase().includes(q)
    ) : state.parents;

    return `
      <div class="anim-in">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;">
          <div>
            <div class="label-text" style="color:var(--terra);">Ministry Records</div>
            <h2 class="font-display" style="font-size:1.875rem;margin:.25rem 0 0;color:var(--ink);">Parents &amp; Guardians</h2>
          </div>
          <div style="display:flex;gap:.5rem;">
            <button class="btn btn-primary" style="padding:.5rem 1rem;font-size:.875rem;font-weight:600;display:flex;align-items:center;gap:.5rem;border-radius:3px;" data-action="new-parent">${icon('user-plus','icon icon-sm')} Add Parent/Guardian</button>
          </div>
        </div>

        <div style="position:relative;margin-bottom:1.25rem;">
          <span style="position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--ink-soft);">${icon('search','icon icon-sm')}</span>
          <input class="input-field" style="padding-left:2.5rem;" placeholder="Search by name, phone, email, or membership…" value="${esc(state.parentSearch)}" data-action="search-parents">
        </div>

        ${filtered.length === 0
          ? `<div class="card" style="padding:2.5rem;text-align:center;">
              <p style="font-size:.95rem;color:var(--ink-soft);margin:0 0 1rem;">${state.parents.length === 0 ? 'No parents or guardians registered yet.' : 'No matches for your search.'}</p>
              ${state.parents.length === 0 ? `<button class="btn btn-primary" style="padding:.5rem 1rem;font-size:.875rem;border-radius:3px;" data-action="new-parent">${icon('user-plus','icon icon-sm')} Register the first one</button>` : ''}
            </div>`
          : `<div class="grid-roster">
              ${filtered.map(p => {
                const auth = p.authorizedForPickup !== false;
                const rel = p.relationship || 'Parent';
                return `
                <button class="card btn" style="padding:1.25rem;text-align:left;border-left:3px solid ${auth ? 'var(--sage)' : 'var(--danger)'};" data-action="edit-parent" data-id="${p.id}">
                  <div style="display:flex;align-items:flex-start;gap:.875rem;">
                    <div class="avatar avatar-sm" style="background:${auth ? 'var(--sage)' : 'var(--danger)'};">${initials(p.fullName)}</div>
                    <div style="min-width:0;flex:1;">
                      <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;">
                        <span style="font-weight:600;font-size:1rem;color:var(--ink);">${esc(p.fullName)}</span>
                        <span style="font-size:.7rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:.125rem .5rem;border-radius:3px;background:var(--cream-soft);color:var(--ink-soft);border:1px solid var(--divider);">${esc(rel)}</span>
                        ${auth
                          ? `<span style="font-size:.7rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:.125rem .5rem;border-radius:3px;background:var(--sage-dark);color:var(--cream-soft);">✓ Authorized</span>`
                          : `<span style="font-size:.7rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:.125rem .5rem;border-radius:3px;background:var(--danger);color:var(--cream-soft);">✗ Not Authorized</span>`
                        }
                      </div>
                      <div style="font-size:.8rem;color:var(--ink-soft);margin-top:.375rem;">
                        ${p.phoneNumbers ? esc(p.phoneNumbers) : ''}${p.phoneNumbers && p.emails ? ' · ' : ''}${p.emails ? esc(p.emails) : ''}
                      </div>
                      ${p.churchMembership ? `<div style="font-size:.75rem;color:var(--ink-soft);margin-top:.125rem;">${esc(p.churchMembership)}</div>` : ''}
                    </div>
                  </div>
                </button>
              `;
              }).join('')}
            </div>`
        }

  // ============================================================
  // Handlers
  // ============================================================
  function attachHandlers() {
    // Delegated click
    document.getElementById('app').addEventListener('click', onClick);
    document.getElementById('app').addEventListener('input', onInput);
    document.getElementById('app').addEventListener('change', onChange);

    // Child form submission
    const form = document.getElementById('child-form');
    if (form) form.addEventListener('submit', onFormSubmit);

    // Parent form submission
    const parentForm = document.getElementById('parent-form');
    if (parentForm) parentForm.addEventListener('submit', onParentFormSubmit);

    // Login form submission
    const loginForm = document.getElementById('login-form');
    if (loginForm) loginForm.addEventListener('submit', onLoginSubmit);

    // Sign-in form submission (separate step after Connect)
    const signinForm = document.getElementById('signin-form');
    if (signinForm) signinForm.addEventListener('submit', onSignInSubmit);

    // Change password form
    const cpForm = document.getElementById('change-password-form');
    if (cpForm) cpForm.addEventListener('submit', onChangePasswordSubmit);

    // User form (admin user management)
    const userForm = document.getElementById('user-form');
    if (userForm) userForm.addEventListener('submit', onUserFormSubmit);

    // Reset password confirm form
    const rpForm = document.getElementById('reset-password-form');
    if (rpForm) rpForm.addEventListener('submit', onResetPasswordSubmit);
  }

  function onLoginSubmit(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    actions.connect(fd.get('backendUrl'), fd.get('passcode'));
  }

  function onSignInSubmit(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    actions.signIn(fd.get('username'), fd.get('password'));
  }

  function onChangePasswordSubmit(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    actions.changeOwnPassword(fd.get('currentPassword'), fd.get('newPassword'), fd.get('confirmPassword'));
  }

  function onUserFormSubmit(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    const u = {
      username: (fd.get('username') || '').trim(),
      fullName: (fd.get('fullName') || '').trim(),
      email: (fd.get('email') || '').trim(),
      role: fd.get('role') || 'Coordinator',
      active: fd.get('active') !== 'false'
    };
    if (state.addingUser) {
      actions.addUser(u, fd.get('password'));
    } else {
      actions.updateUser(u);
    }
  }

  function onResetPasswordSubmit(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    actions.resetUserPassword(state.resettingPasswordFor, fd.get('newPassword'), fd.get('confirmPassword'));
  }

  function onClick(e) {
    const target = e.target.closest('[data-action]');
    // Close settings/user menu on outside click
    if ((state.showSettings || state.showUserMenu) && !target) {
      let changed = false;
      if (state.showSettings && !e.target.closest('[data-action="toggle-settings"]')) {
        state.showSettings = false; changed = true;
      }
      if (state.showUserMenu && !e.target.closest('[data-action="toggle-user-menu"]')) {
        state.showUserMenu = false; changed = true;
      }
      if (changed) render();
      return;
    }
    if (!target) return;
    const action = target.dataset.action;
    const id = target.dataset.id;

    switch (action) {
      case 'goto': actions.goto(target.dataset.view); break;
      case 'goto-roster': actions.goto('roster'); break;
      case 'goto-checkin': actions.goto('checkin'); break;
      case 'goto-checkout': actions.goto('checkout'); break;
      case 'goto-parents': actions.goto('parents'); break;
      case 'new-child': actions.goto('form', {editing: emptyChild()}); break;
      case 'new-parent': actions.goto('parent-form', {editingParent: emptyParent()}); break;
      case 'view-child': actions.goto('child', {selectedId: id}); break;
      case 'edit-child': {
        const c = state.children.find(x => x.id === id);
        actions.goto('form', {editing: Object.assign({}, c)});
        break;
      }
      case 'edit-parent': {
        const p = state.parents.find(x => x.id === id);
        actions.goto('parent-form', {editingParent: Object.assign({}, p)});
        break;
      }
      case 'delete-child': actions.deleteChild(id); break;
      case 'delete-parent': actions.deleteParent(id); break;
      case 'checkin-child': actions.checkIn(id); actions.goto('checkin'); break;
      case 'check-in': actions.checkIn(id); break;
      case 'check-out': actions.checkOut(id); break;
      case 'checkout-with': {
        const recId = target.dataset.recId;
        const parentId = target.dataset.parentId;
        actions.checkOut(recId, parentId);
        break;
      }
      case 'checkout-other': {
        state.checkoutOtherFor = target.dataset.recId;
        state.checkoutOtherName = '';
        render();
        break;
      }
      case 'checkout-cancel-other': {
        state.checkoutOtherFor = null;
        state.checkoutOtherName = '';
        render();
        break;
      }
      case 'checkout-confirm-other': {
        const recId = target.dataset.recId;
        const name = (state.checkoutOtherName || '').trim();
        if (!name) { toast('Enter a name first', 'error'); break; }
        state.checkoutOtherFor = null;
        state.checkoutOtherName = '';
        actions.checkOut(recId, name);
        break;
      }
      case 'cancel-form': actions.goto(state.selectedId ? 'child' : 'roster'); break;
      case 'cancel-parent-form': actions.goto('parents'); break;
      case 'export-json': actions.exportJSON(); break;
      case 'export-csv': actions.exportCSV(); break;
      case 'toggle-settings': actions.toggleSettings(); break;
      case 'toggle-user-menu': state.showUserMenu = !state.showUserMenu; state.showSettings = false; render(); break;
      case 'disconnect': actions.disconnect(); break;
      case 'refresh': actions.refresh(); break;
      case 'show-login': state.showSettings = false; state.view = 'login'; render(); break;
      case 'try-demo': state.view = 'dashboard'; render(); break;
      case 'sign-out': state.showUserMenu = false; actions.signOut(); break;
      case 'back-to-connect': {
        // User clicked "Reconfigure connection" on the sign-in step
        store.remove(KEYS.CONFIG);
        state.config = null;
        state.bootError = null;
        state.loginError = null;
        render();
        break;
      }
      case 'open-change-password':
        state.showUserMenu = false;
        state.showChangePassword = true;
        render();
        break;
      case 'close-change-password':
        state.showChangePassword = false;
        render();
        break;
      case 'goto-users': {
        state.showUserMenu = false;
        if (!isAdmin()) { toast('Administrator access required.', 'error'); break; }
        state.view = 'users';
        render();
        actions.loadUsers();
        break;
      }
      case 'reload-users': actions.loadUsers(); break;
      case 'goto-coming-soon': actions.goto('coming-soon'); break;
      case 'add-user':
        if (!isAdmin()) { toast('Administrator access required.', 'error'); break; }
        state.editingUser = null;
        state.addingUser = true;
        state.view = 'user-form';
        render();
        break;
      case 'edit-user': {
        if (!isAdmin()) { toast('Administrator access required.', 'error'); break; }
        const username = target.dataset.username;
        const u = state.users.find(x => x.username === username);
        if (!u) { toast('User not found.', 'error'); break; }
        state.editingUser = Object.assign({}, u);
        state.addingUser = false;
        state.view = 'user-form';
        render();
        break;
      }
      case 'cancel-user-form':
        state.editingUser = null;
        state.addingUser = false;
        state.view = 'users';
        render();
        break;
      case 'delete-user': {
        if (!isAdmin()) { toast('Administrator access required.', 'error'); break; }
        const username = target.dataset.username;
        actions.deleteUser(username);
        break;
      }
      case 'reset-password': {
        if (!isAdmin()) { toast('Administrator access required.', 'error'); break; }
        state.resettingPasswordFor = target.dataset.username;
        render();
        break;
      }
      case 'cancel-reset-password':
        state.resettingPasswordFor = null;
        render();
        break;
      case 'set-preferred': {
        state.editing = state.editing || emptyChild();
        state.editing.preferredContact = target.dataset.value;
        captureFormInputs();
        render();
        break;
      }
      case 'set-status': {
        state.editing = state.editing || emptyChild();
        state.editing.visitorStatus = target.dataset.value;
        captureFormInputs();
        render();
        break;
      }
      case 'set-parent-preferred': {
        state.editingParent = state.editingParent || emptyParent();
        state.editingParent.preferredContact = target.dataset.value;
        captureParentFormInputs();
        render();
        break;
      }
      case 'set-parent-auth': {
        state.editingParent = state.editingParent || emptyParent();
        state.editingParent.authorizedForPickup = target.dataset.value === 'true';
        captureParentFormInputs();
        render();
        break;
      }
      case 'unlink-parent': {
        captureFormInputs();
        const c = state.editing || emptyChild();
        c.parentIds = (c.parentIds || []).filter(pid => pid !== id);
        // Optionally remove that parent's name from the parentNames text too
        const removed = state.parents.find(p => p.id === id);
        if (removed && c.parentNames) {
          const names = c.parentNames.split(',').map(s => s.trim()).filter(s => s && s !== removed.fullName);
          c.parentNames = names.join(', ');
        }
        state.editing = c;
        render();
        break;
      }
      case 'toggle': {
        state.editing = state.editing || emptyChild();
        const name = target.dataset.name;
        state.editing[name] = !state.editing[name];
        captureFormInputs();
        render();
        break;
      }
    }
  }

  function onInput(e) {
    const target = e.target;
    if (target.dataset.action === 'search-roster') {
      state.search = target.value;
      // Re-render only the list area — but simplest: full re-render after slight delay
      clearTimeout(window._searchT);
      window._searchT = setTimeout(() => { render(); const inp = document.querySelector('[data-action="search-roster"]'); if (inp) { inp.focus(); inp.setSelectionRange(state.search.length, state.search.length); } }, 100);
    } else if (target.dataset.action === 'search-checkin') {
      state.checkinSearch = target.value;
      clearTimeout(window._searchT);
      window._searchT = setTimeout(() => { render(); const inp = document.querySelector('[data-action="search-checkin"]'); if (inp) { inp.focus(); inp.setSelectionRange(state.checkinSearch.length, state.checkinSearch.length); } }, 100);
    } else if (target.dataset.action === 'search-parents') {
      state.parentSearch = target.value;
      clearTimeout(window._searchT);
      window._searchT = setTimeout(() => { render(); const inp = document.querySelector('[data-action="search-parents"]'); if (inp) { inp.focus(); inp.setSelectionRange(state.parentSearch.length, state.parentSearch.length); } }, 100);
    } else if (target.dataset.action === 'search-users') {
      state.userSearch = target.value;
      clearTimeout(window._searchT);
      window._searchT = setTimeout(() => { render(); const inp = document.querySelector('[data-action="search-users"]'); if (inp) { inp.focus(); inp.setSelectionRange(state.userSearch.length, state.userSearch.length); } }, 100);
    } else if (target.dataset.action === 'checkout-other-input') {
      // Don't re-render — just capture the typed name
      state.checkoutOtherName = target.value;
    } else if (target.name === 'birthdate') {
      // Live-update age display
      const age = calcAge(target.value);
      const ageEl = document.getElementById('age-display');
      if (ageEl) ageEl.value = age || '';
    }
  }

  function onChange(e) {
    const target = e.target;
    if (target.dataset.action === 'import-json') {
      const file = target.files && target.files[0];
      if (file) actions.importJSON(file);
    } else if (target.dataset.action === 'link-parent') {
      const parentId = target.value;
      if (!parentId) return;
      const parent = state.parents.find(p => p.id === parentId);
      if (!parent) return;
      captureFormInputs();
      const c = state.editing || emptyChild();
      if (!Array.isArray(c.parentIds)) c.parentIds = [];
      if (!c.parentIds.includes(parentId)) c.parentIds.push(parentId);
      // Auto-fill text fields if they're empty so legacy display still works
      const existingNames = (c.parentNames || '').split(',').map(s => s.trim()).filter(Boolean);
      if (!existingNames.includes(parent.fullName)) {
        c.parentNames = existingNames.concat([parent.fullName]).join(', ');
      }
      if (!c.phoneNumbers && parent.phoneNumbers) c.phoneNumbers = parent.phoneNumbers;
      if (!c.emails && parent.emails) c.emails = parent.emails;
      if ((!c.preferredContact || c.preferredContact === 'Phone') && parent.preferredContact) {
        c.preferredContact = parent.preferredContact;
      }
      state.editing = c;
      render();
      toast(`Linked ${parent.fullName}`);
    }
  }

  function captureFormInputs() {
    const form = document.getElementById('child-form');
    if (!form) return;
    const fd = new FormData(form);
    const base = state.editing || emptyChild();
    for (const [k, v] of fd.entries()) {
      if (k === 'photoConsent' || k === 'newsletterOptIn') continue; // handled separately
      base[k] = v;
    }
    state.editing = base;
  }

  function captureParentFormInputs() {
    const form = document.getElementById('parent-form');
    if (!form) return;
    const fd = new FormData(form);
    const base = state.editingParent || emptyParent();
    for (const [k, v] of fd.entries()) {
      base[k] = v;
    }
    state.editingParent = base;
  }

  function onFormSubmit(e) {
    e.preventDefault();
    const form = e.target;
    const fd = new FormData(form);
    const data = Object.assign({}, state.editing || emptyChild());
    for (const [k, v] of fd.entries()) {
      if (k === 'photoConsent' || k === 'newsletterOptIn') {
        data[k] = v === 'true';
      } else {
        data[k] = typeof v === 'string' ? v.trim() : v;
      }
    }
    // Preserve button-driven fields from state.editing
    if (state.editing) {
      data.preferredContact = state.editing.preferredContact || data.preferredContact;
      data.visitorStatus = state.editing.visitorStatus || data.visitorStatus;
      data.photoConsent = state.editing.photoConsent != null ? state.editing.photoConsent : (data.photoConsent === 'true');
      data.newsletterOptIn = state.editing.newsletterOptIn != null ? state.editing.newsletterOptIn : (data.newsletterOptIn === 'true');
      // Linked parent IDs are managed via the link/unlink buttons, not form fields
      data.parentIds = Array.isArray(state.editing.parentIds) ? state.editing.parentIds.slice() : [];
      data.authorizedPickupIds = Array.isArray(state.editing.authorizedPickupIds) ? state.editing.authorizedPickupIds.slice() : [];
      if (state.editing.id) data.id = state.editing.id;
      if (state.editing.createdAt) data.createdAt = state.editing.createdAt;
    }
    actions.saveChild(data);
  }

  function onParentFormSubmit(e) {
    e.preventDefault();
    const form = e.target;
    const fd = new FormData(form);
    const data = Object.assign({}, state.editingParent || emptyParent());
    for (const [k, v] of fd.entries()) {
      data[k] = typeof v === 'string' ? v.trim() : v;
    }
    // Preserve button-driven fields from state.editingParent
    if (state.editingParent) {
      data.preferredContact = state.editingParent.preferredContact || data.preferredContact;
      // authorizedForPickup is a boolean set via button group, not in FormData
      data.authorizedForPickup = state.editingParent.authorizedForPickup !== false;
      if (state.editingParent.id) data.id = state.editingParent.id;
      if (state.editingParent.createdAt) data.createdAt = state.editingParent.createdAt;
    }
    actions.saveParent(data);
  }

  // Boot
  init();

  // Refresh the dashboard every 30 seconds so the displayed time stays current.
  // We only re-render when the user is actually viewing the dashboard, so we
  // don't disrupt anything they're typing in a form or check-in screen.
  setInterval(() => {
    if (state.view === 'dashboard') render();
  }, 30000);
  </script>
</body>
</html>
